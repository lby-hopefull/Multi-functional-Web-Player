<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  margin:0; 
  font-family:sans-serif; 
  background:#f5f5f5; 
  color:#333;
  overflow: hidden;
  height: 100vh;
}

/* 统一按钮样式 */
button {
  margin: 3px;
  padding: 8px 16px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  background: #2196F3;
  color: white;
  font-size: 14px;
  transition: all 0.2s;
}
button:hover {
  background: #1976D2;
  transform: scale(1.02);
}
button:disabled {
  background: #ccc;
  cursor: not-allowed;
}

.hidden { display:none; }

/* 页面容器 */
.page-container {
  height: calc(100vh - 50px);
  overflow: hidden;
}
.page-container > section {
  height: 100%;
  display: none;
  overflow-y: auto;
}
.page-container > section.active {
  display: block;
}

/* 底部导航栏 */
.navbar { 
  position:fixed; 
  bottom:0; 
  left:0; 
  right:0; 
  display:flex; 
  justify-content:space-around; 
  background:#fff; 
  border-top:1px solid #ddd; 
  z-index:100;
  height: 50px;
}
.navbar button { 
  flex:1; 
  padding:10px; 
  background:none; 
  border:none;
  color: #333;
  font-size: 14px;
}
.navbar button:hover {
  background: #f0f0f0;
  transform: none;
}

/* ========== 播放器页面 - 上下滑动两页 ========== */
#player-swiper {
  height: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
}
.player-page {
  min-height: 100%;
  scroll-snap-align: start;
  display: flex;
  flex-direction: column;
  padding: 20px;
}

/* 第一页：封面和控制 */
#player-page-cover {
  justify-content: center;
  align-items: center;
}

#albumCover {
  width: 70vw;
  height: 70vw;
  max-width: 350px;
  max-height: 350px;
  margin: 0 auto 30px;
  background: #ddd;
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
#albumCover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
#coverPlaceholder {
  color: #666;
  font-size: 18px;
}

#progressSection {
  width: 100%;
  max-width: 500px;
  margin: 0 auto 20px;
}
#trackInfo {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 16px;
}
#trackDetails {
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  margin-right: 10px;
}
#songTitle {
  font-weight: bold;
  font-size: 18px;
}
#songArtistAlbum {
  font-size: 0.9em;
  color: #666;
  margin-top: 4px;
}
#trackProgress {
  white-space: nowrap;
  color: #666;
}
/* 播放进度条样式与音量统一 */
#progressBar { 
  width: 100%;
  height: 6px;
  background: #ddd;
  border-radius: 3px;
  outline: none;
}

.controls-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
  margin: 20px 0;
}
.controls-row button {
  padding: 12px 20px;
  font-size: 16px;
}
#playPauseBtn {
  padding: 15px 25px;
  font-size: 20px;
}

.play-mode-section {
  display: flex;
  align-items: center;
  gap: 8px;
}
#playMode {
  padding: 6px 12px;
  border-radius: 4px;
  border: 1px solid #ddd;
}

.volume-section {
  display: flex;
  align-items: center;
  gap: 8px;
}
#volumeSlider {
  width: 120px;
}

/* 第二页：播放队列 */
#player-page-queue {
  padding-top: 30px;
}
.queue-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  padding: 0 10px;
}
.queue-header h3 {
  margin: 0;
}
#playlist {
  max-height: calc(100% - 60px);
  overflow-y: auto;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 10px;
  background: white;
}
.song { 
  padding: 10px 15px; 
  border-bottom: 1px solid #eee; 
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 4px;
}
.song:last-child {
  border-bottom: none;
}
.song:hover {
  background: #f5f5f5;
}
.song.playing { 
  background: #e3f2fd; 
  font-weight: bold;
  color: #2196F3;
}

/* ========== 歌词界面 ========== */
#lyricsContainer {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 50px;
  background: rgba(245, 245, 245, 0.98);
  z-index: 50;
  display: none;
  overflow-y: auto;
  padding: 60px 20px 100px;
  scroll-behavior: smooth;
}

/* 歌词延迟控制 */
#lyricDelayControl {
  position: fixed;
  top: 10px;
  left: 10px;
  background: rgba(33, 150, 243, 0.9);
  color: white;
  padding: 8px 12px;
  border-radius: 20px;
  z-index: 101;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
}
#lyricDelayControl button {
  padding: 4px 10px;
  margin: 0;
  background: rgba(255,255,255,0.2);
  font-size: 16px;
}
#lyricDelayControl button:hover {
  background: rgba(255,255,255,0.3);
}

#coverLyricToggle {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(33, 150, 243, 0.9);
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  z-index: 100;
  font-size: 14px;
}
#coverLyricToggle:hover {
  background: rgba(25, 118, 210, 1);
}

/* 歌词行样式 - 可调整参数 */
.lyric-line-container {
  padding: 12px 0;  /* 行间距：上下内边距控制行间距 */
  cursor: pointer;
  transition: all 0.3s ease;
}

/* 原文容器 */
.lyric-text-container {
  text-align: center;
}

/* 逐字/逐词样式 */
.lyric-word-wrapper {
  position: relative;
  display: inline-block;
  font-size: 24px;  /* 歌词文字大小 */
  line-height: 1.4;  /* 行高 */
  margin: 0 2px;
}

.lyric-word-bg {
  color: #666;  /* 未播放字的颜色 */
}

.lyric-word-fg {
  position: absolute;
  left: 0;
  top: 0;
  color: #2196F3;  /* 已播放字的颜色 */
  overflow: hidden;
  white-space: nowrap;
  width: 0%;
  transition: width 0.05s linear;  /* 逐字填充过渡时间 */
}

/* 普通行样式 */
.lyric-line {
  font-size: 24px;  /* 歌词文字大小 */
  line-height: 1.4;  /* 行高 */
  color: #666;  /* 未播放行颜色 */
  text-align: center;
  transition: all 0.3s;
}
.lyric-line.active {
  color: #2196F3;  /* 当前播放行颜色 */
  font-weight: bold;
  transform: scale(1.05);
}

/* 翻译行样式 */
.lyric-translate {
  text-align: center;
  color: #888;  /* 翻译文字颜色 */
  font-size: 20px;  /* 翻译文字大小 */
  margin-top: 6px;
  margin-bottom: 25px;  /* 与下一行的间距 */
  font-style: italic;
  transition: all 0.3s;
}
.lyric-translate.active {
  color: #333;
  font-weight: 500;
}

/* ========== 歌曲列表页面 ========== */
#page-lists {
  padding: 20px;
}
.list { 
  margin-top: 15px; 
}
.list-title { 
  font-weight: bold; 
  margin-top: 15px; 
  cursor: pointer; 
  user-select: none;
  padding: 10px;
  background: white;
  border-radius: 8px;
  border: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.list-title button { 
  margin-left: 4px;
  padding: 4px 10px;
  font-size: 12px;
}
.song-item { 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  padding: 10px 15px; 
  border-bottom: 1px solid #eee;
  background: white;
}
.song-item:last-child {
  border-bottom: none;
}


/* ========== 统计页面 ========== */
#page-stats {
  padding: 20px;
}
#stats {
  background: white;
  border-radius: 8px;
  padding: 15px;
  border: 1px solid #ddd;
}
#stats div {
  padding: 10px 0;
  border-bottom: 1px solid #eee;
  display: flex;

<script>
// ========== 全局变量 ==========
let currentTrack=0, isPlaying=false;
let tracks=[], currentQueue=[];
const audio=new Audio();
let db;
const dbName='MusicPlayerDB', storeName='musicCache';
const storeNames = ['musicCache', 'currentList', 'customLists', 'playlist', 'playStats', 'setting'];
let targetList = '';
let allSongsCache = [];
let trackedSongs = {};
let selectedSongs = new Set();
let isDownloading = false;
let currentLyrics = [], lyricElements = [], isUserScrollingLyrics = false;
let lyricDelay = 0; // 歌词延迟（秒）
let cachedSongsSet = new Set(); // 已缓存歌曲集合

// ========== IndexedDB 操作函数 ==========
function dbStore(storeName, mode='readonly') {
  return db.transaction([storeName], mode).objectStore(storeName);
}

function dbGet(storeName, key) {
  return new Promise(resolve => {
    if(!db) return resolve(null);
    const req = dbStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null);
  });
}

function dbPut(storeName, key, value) {
  return new Promise(resolve => {
    if(!db) return resolve(false);
    const req = dbStore(storeName, 'readwrite').put({id: key, data: value});
    req.onsuccess = () => resolve(true);
    req.onerror = () => resolve(false);
  });
}

function dbGetAll(storeName) {
  return new Promise(resolve => {
    if(!db) return resolve([]);
    const req = dbStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => resolve([]);
  });
}

function dbClear(storeName) {
  return new Promise(resolve => {
    if(!db) return resolve(false);
    const req = dbStore(storeName, 'readwrite').clear();
    req.onsuccess = () => resolve(true);
    req.onerror = () => resolve(false);
  });
}

function dbDelete(storeName, key) {
  return new Promise(resolve => {
    if(!db) return resolve(false);
    const req = dbStore(storeName, 'readwrite').delete(key);
    req.onsuccess = () => resolve(true);
    req.onerror = () => resolve(false);
  });
}

function initDB(){
  return new Promise(res=>{
    const req=indexedDB.open(dbName, 4);
    req.onupgradeneeded=e=>{ 
      const database = e.target.result;
      storeNames.forEach(name => {
        if(!database.objectStoreNames.contains(name)) {
          database.createObjectStore(name, {keyPath:'id'});
        }
      });
    };
    req.onsuccess=e=>{ db=e.target.result; res(true); };
    req.onerror=()=>res(false);
  });
}

function getMusic(name){
  return new Promise(r=>{
    if(!db)return r(null);
    const tx=db.transaction([storeName],'readonly');
    tx.objectStore(storeName).get(name).onsuccess=e=>r(e.target.result?e.target.result.data:null);
  });
}

function saveMusic(name,data){
  if(!db)return;
  db.transaction([storeName],'readwrite').objectStore(storeName).put({id:name,data});
}

// ========== 页面切换函数 ==========
function showPage(pageName) {
  document.querySelectorAll('.page-container > section').forEach(sec => {
    sec.classList.remove('active');
  });
  document.getElementById('page-' + pageName).classList.add('active');
  
  if(pageName === 'manage') {
    renderManageList();
  } else if(pageName === 'lists') {
    renderLists();
  } else if(pageName === 'stats') {
    renderStats();
  }
}

// ========== 歌词延迟控制 ==========
async function adjustLyricDelay(delta) {
  lyricDelay += delta;
  lyricDelay = Math.round(lyricDelay * 100) / 100;
  document.getElementById('lyricDelayValue').textContent = lyricDelay.toFixed(2) + 's';
  await dbPut('setting', 'lyricDelay', lyricDelay);
}

async function loadLyricDelay() {
  const saved = await dbGet('setting', 'lyricDelay');
  if(saved && saved.data !== undefined) {
    lyricDelay = saved.data;
    document.getElementById('lyricDelayValue').textContent = lyricDelay.toFixed(2) + 's';
  }
}

// ========== 真随机数生成 ==========
function trueRandom(max) {
  if(max <= 0) return 0;
  const seed = Date.now() + Math.random() * 10000;
  return Math.floor((Math.abs(Math.sin(seed)) * 10000) % max);
}

// ========== 播放控制 ==========
async function playTrack(i){
  if(i<0||i>=currentQueue.length) return;
  currentTrack=i;
  const name=currentQueue[i];
  
  trackedSongs[name] = false;
  
  let audioUrl;
  const cached=await getMusic(name);
  let blob = null;
  if(cached){
    blob = new Blob([cached],{type:'audio/mpeg'});
    audioUrl = URL.createObjectURL(blob);
    audio.src = audioUrl;
    loadSongMetadata(name, blob);
  } else {
    audioUrl = '/music_play?file='+encodeURIComponent(name);
    audio.src = audioUrl;
    loadSongMetadata(name, audioUrl);
    cacheSong(name);
  }
  
  audio.play();isPlaying=true;updateBtn();highlight();
}

function togglePlayPause(){
  if(!audio.src)return;
  if(isPlaying)audio.pause();
  else audio.play();
  isPlaying=!isPlaying;
  updateBtn();
}

function updateBtn(){
  document.getElementById('playPauseBtn').textContent=isPlaying?'⏸':'▶';
}

async function playNext(){
  if(currentQueue.length === 0) return;
  const mode=document.getElementById('playMode').value;
  if(mode==='random'){
    let n;
    if(currentQueue.length === 1) {
      n = 0;
    } else {
      do{n=trueRandom(currentQueue.length);}while(n===currentTrack);
    }
    await playTrack(n);
  }else if(mode==='loop'){
    await playTrack(currentTrack);
  }else if(currentTrack<currentQueue.length-1){
    await playTrack(currentTrack+1);
  } else {
    await playTrack(0);
  }
}

async function playPrev(){
  if(currentQueue.length === 0) return;
  const mode=document.getElementById('playMode').value;
  if(mode==='random'){
    let n;
    if(currentQueue.length === 1) {
      n = 0;
    } else {
      do{n=trueRandom(currentQueue.length);}while(n===currentTrack);
    }
    await playTrack(n);
  }else{
    await playTrack((currentTrack-1+currentQueue.length)%currentQueue.length);
  }
}

audio.addEventListener('timeupdate',()=>{
  if(audio.duration){
    document.getElementById('progressBar').value=(audio.currentTime/audio.duration)*100;
    document.getElementById('trackProgress').textContent=format(audio.currentTime)+'/'+format(audio.duration);
    updateLyricHighlight();
    if(audio.duration > 0 && audio.currentTime / audio.duration >= 0.8) {
      const currentSong = currentQueue[currentTrack];
      if(currentSong && !trackedSongs[currentSong]) {
        incStats(currentSong);
        trackedSongs[currentSong] = true;
      }
    }
  }
});

document.getElementById('progressBar').addEventListener('input',function(){
  if(audio.duration)audio.currentTime=(this.value/100)*audio.duration;
});

audio.addEventListener('ended',()=>playNext());

function format(s){
  const m=Math.floor(s/60),sec=Math.floor(s%60);
  return`${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

// ========== 播放列表渲染 ==========
function renderPlaylist(){
  const box=document.getElementById('playlist');
  box.innerHTML='';
  if(currentQueue.length === 0) {
    box.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">暂无歌曲</div>';
    return;
  }
  currentQueue.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='song';
    if(i===currentTrack)d.classList.add('playing');
    d.textContent=t;
    d.onclick=()=>playTrack(i);
    box.appendChild(d);
  });
}

function highlight(){
  document.querySelectorAll('#playlist .song').forEach((d,i)=>d.classList.toggle('playing',i===currentTrack));
}

async function shuffleQueue(){
  if(currentQueue.length <= 1) return;
  // 使用真随机排序
  for(let i = currentQueue.length - 1; i > 0; i--) {
    const j = trueRandom(i + 1);
    [currentQueue[i], currentQueue[j]] = [currentQueue[j], currentQueue[i]];
  }
  currentTrack = 0;
  await dbPut('currentList', 'queue', currentQueue);
  renderPlaylist();
  playTrack(0);
}

async function cacheSong(name){
  if(await getMusic(name))return;
  const r=await fetch('/music_play?file='+encodeURIComponent(name));
  const b=await r.arrayBuffer();
  saveMusic(name,b);
}

async function refreshList(){
  try {
    const response = await fetch('/music_list');
    if (!response.ok) throw new Error('获取失败');
    const serverTracks = await response.json();
    const savedTracks = await dbGet('playlist', 'all');
    const mergedTracks = [...new Set([...(savedTracks?.data || []), ...serverTracks])];
    tracks = mergedTracks;
    await dbPut('playlist', 'all', tracks);
    await dbPut('customLists', '全部歌曲', tracks);
    // 更新已缓存集合
    await updateCachedSongsSet();
    renderManageList();
    alert('列表已更新');
  } catch (error) {
    console.error('获取服务器列表失败:', error);
    const saved = await dbGet('playlist', 'all');
    if (saved) tracks = saved.data || [];
  }
}

// ========== 自定义列表管理 ==========
async function loadLists(){
  const result = await dbGetAll('customLists');
  const lists = {};
  result.forEach(item => {
    lists[item.id] = item.data;
  });
  return lists;
}

async function saveLists(o){
  await dbClear('customLists');
  for(const k in o){
    await dbPut('customLists', k, o[k]);
  }
  renderLists();
}

async function createList(){
  const n=document.getElementById('newListName').value.trim();
  if(!n)return;
  const lists=await loadLists();
  if(lists[n]){alert('该列表已存在');return;}
  lists[n]=[];
  await saveLists(lists);
  document.getElementById('newListName').value = '';
}

// 打开歌曲管理窗口，自动勾选已添加的歌曲
async function showAddSongsDialog(listName){
  targetList=listName;
  const dialog=document.getElementById('songDialog');
  const container=document.getElementById('dialogSongList');
  container.innerHTML='';
  
  // 修改标题
  const title = dialog.querySelector('h3');
  if(title) title.textContent = '管理当前列表歌曲';
  
  const lists = await loadLists();
  const existingSongs = lists[listName] || [];
  allSongsCache = lists['全部歌曲'] || tracks;
  
  allSongsCache.forEach((song,i)=>{
    const label=document.createElement('label');
    const checked = existingSongs.includes(song) ? 'checked' : '';
    label.innerHTML=`<input type="checkbox" value="${i}" ${checked}> ${song}`;
    container.appendChild(label);
  });
  dialog.showModal();
}

async function confirmAddSongs(){
  const checkboxes=document.querySelectorAll('#dialogSongList input[type=checkbox]');
  const lists=await loadLists();
  if(!lists[targetList]) lists[targetList]=[];
  
  checkboxes.forEach(cb=>{
    const song=allSongsCache[parseInt(cb.value)];
    const exists = lists[targetList].includes(song);
    
    if(cb.checked && !exists) {
      lists[targetList].push(song);
    } else if(!cb.checked && exists) {
      const idx = lists[targetList].indexOf(song);
      if(idx > -1) lists[targetList].splice(idx, 1);
    }
  });
  
  await saveLists(lists);
  closeDialog();
}

function closeDialog(){
  document.getElementById('songDialog').close();
}

async function deleteSongFromList(listName,idx){
  const lists=await loadLists();
  lists[listName].splice(idx,1);
  await saveLists(lists);
}

async function deleteList(name){
  if(name==='全部歌曲') return;
  const lists=await loadLists();
  delete lists[name];
  await saveLists(lists);
}

// 渲染列表：删除全部歌曲的添加按钮，自建列表按钮改为管理
async function renderLists(){
  const div=document.getElementById('customLists');
  div.innerHTML='';
  const lists=await loadLists();
  if(!lists['全部歌曲']){ 
    lists['全部歌曲']=tracks; 
    await saveLists(lists); 
  }

  for(const k in lists){
    const wrap=document.createElement('div');
    wrap.className='list';
    const title=document.createElement('div');
    title.className='list-title';
    title.innerHTML = `<span>${k}</span>` +
      (k!=='全部歌曲'?`<span><button onclick="event.stopPropagation();deleteList('${k}')">删除</button><button onclick="event.stopPropagation();showAddSongsDialog('${k}')">管理</button></span>`:'');
    title.onclick=function(e){
      if(e.target.tagName==='BUTTON') return;
      const ul=this.nextElementSibling;
      ul.style.display = ul.style.display==='none'?'block':'none';
    };
    wrap.appendChild(title);

    const ul=document.createElement('div');
    ul.style.display='none';
    lists[k].forEach((song,idx)=>{
      const item=document.createElement('div');
      item.className='song-item';
      item.style.cursor = 'pointer';
      item.innerHTML=`<span>${song}</span>`;
      item.onclick=()=>playListRandomFromSong(k,song);
      ul.appendChild(item);
    });
    wrap.appendChild(ul);
    div.appendChild(wrap);
  }
}

async function playListRandomFromSong(listName,song){
  const lists=await loadLists();
  if(!lists[listName] || lists[listName].length===0) return;
  const fullList=[...lists[listName]];
  if(fullList.length === 0) return;
  const index=fullList.indexOf(song);
  if(index<0) { 
    currentQueue = [...fullList];
    currentTrack = 0;
  } else {
    const first=fullList.splice(index,1);
    for(let i=fullList.length-1;i>0;i--){
      const j=trueRandom(i+1);
      [fullList[i],fullList[j]]=[fullList[j],fullList[i]];
    }
    currentQueue=[...first,...fullList];
    currentTrack=0;
  }
  await dbPut('currentList', 'queue', currentQueue);
  renderPlaylist();
  playTrack(currentTrack);
}

// ========== 播放统计 ==========
async function incStats(name){
  const stats = await dbGet('playStats', 'songs');
  let s = {};
  if(stats && stats.data) {
    s = stats.data;
  }
  s[name]=(s[name]||0)+1;
  await dbPut('playStats', 'songs', s);
  renderStats();
}

async function renderStats(){
  const stats = await dbGet('playStats', 'songs');
  const s = stats ? (stats.data || {}) : {};
  const d=document.getElementById('stats');
  d.innerHTML='';
  const sortedStats = Object.entries(s).sort((a, b) => b[1] - a[1]);
  if(sortedStats.length === 0) {
    d.innerHTML = '<div style="text-align:center;color:#999;">暂无播放记录</div>';
    return;
  }
  sortedStats.forEach(([song, count]) => {
    const div = document.createElement('div');
    div.innerHTML = `<span>${song}</span><span>${count} 次</span>`;
    d.appendChild(div);
  });
}

// ========== 歌词解析 ==========
function parseTimeToSeconds(timeStr) {
  const match = timeStr.match(/\[(\d{1,2}):(\d{2})\.(\d{2,3})\]/);
  if (!match) return null;
  const minutes = parseInt(match[1]);
  const seconds = parseInt(match[2]);
  const milliseconds = parseInt(match[3].padEnd(3, '0'));
  return minutes * 60 + seconds + milliseconds / 1000;
}

function parseLyrics(lyricText) {
  if (!lyricText || typeof lyricText !== 'string') return [];
  
  const lines = lyricText.split('\n');
  const lyrics = [];
  let lastMainLine = null;
  
  for (let i = 0; i < lines.length; i++) {
    const rawLine = lines[i].trim();
    if (!rawLine) continue;
    
    // 提取所有时间戳
    const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/g;
    const matches = [...rawLine.matchAll(timeRegex)];
    
    if (matches.length === 0) continue;
    
    // 判断是否为翻译行：
    // 1. 行首行尾时间戳相同 [00:38.62]...[00:38.62]
    // 2. 或者内容全是中文（不含英文字母）
    const firstTag = matches[0][0];
    const lastTag = matches[matches.length - 1][0];
    const contentWithoutTags = rawLine.replace(/\[.*?\]/g, '').trim();
    const isChineseOnly = /^[\u4e00-\u9fa5\s，。？！、：""''（）]+$/.test(contentWithoutTags);
    const isTranslateLine = firstTag === lastTag || (isChineseOnly && matches.length === 1);
    
    if (isTranslateLine && lastMainLine) {
      // 这是翻译行，附加到上一行
      lastMainLine.translate = contentWithoutTags;
      continue;
    }
    
    // 解析原文行
    const lineObj = {
      type: 'normal',
      startTime: parseInt(matches[0][1]) * 60 + parseInt(matches[0][2]) + parseInt(matches[0][3].padEnd(3, '0')) / 1000,
      text: '',
      translate: null,
      words: []
    };
    
    // 判断是否为逐词/逐字歌词（多个时间戳）
    if (matches.length > 1) {
      // 逐词解析
      let textContent = '';
      for (let j = 0; j < matches.length; j++) {
        const match = matches[j];
        const time = parseInt(match[1]) * 60 + parseInt(match[2]) + parseInt(match[3].padEnd(3, '0')) / 1000;
        
        // 提取该时间戳后的文本，直到下一个时间戳或行尾
        const startIdx = match.index + match[0].length;
        const endIdx = j < matches.length - 1 ? matches[j + 1].index : rawLine.length;
        let word = rawLine.substring(startIdx, endIdx).trim();
        
        // 清理尾部标点
        word = word.replace(/[,\?\.!\s]+$/, '');
        // 删除中文间不必要的空格
        word = word.replace(/([\u4e00-\u9fa5])\s+([\u4e00-\u9fa5])/g, '$1$2');
        
        if (word) {
          lineObj.words.push({
            text: word,
            startTime: time,
            endTime: j < matches.length - 1 ? 
              parseInt(matches[j + 1][1]) * 60 + parseInt(matches[j + 1][2]) + parseInt(matches[j + 1][3].padEnd(3, '0')) / 1000 :
              time + 0.5
          });
          textContent += word;
        }
      }
      
      lineObj.text = textContent;
      lineObj.type = lineObj.words.length > 1 ? 'word-by-word' : 'normal';
      if (lineObj.words.length > 0) {
        lineObj.endTime = lineObj.words[lineObj.words.length - 1].endTime;
      }
    } else {
      // 普通行，单个时间戳
      lineObj.text = contentWithoutTags;
      // 删除中文间不必要的空格
      lineObj.text = lineObj.text.replace(/([\u4e00-\u9fa5])\s+([\u4e00-\u9fa5])/g, '$1$2');
      lineObj.endTime = lineObj.startTime + 3;
    }
    
    lyrics.push(lineObj);
    lastMainLine = lineObj;
  }
  
  return lyrics.sort((a, b) => a.startTime - b.startTime);
}

function loadSongMetadata(songName, audioUrl) {
  if (typeof jsmediatags !== 'undefined') {
    jsmediatags.read(audioUrl, {
      onSuccess: function(tag) {
        const tags = tag.tags;
        document.getElementById('songTitle').textContent = tags.title || songName;
        document.getElementById('songArtistAlbum').textContent = 
          `${tags.artist || '未知歌手'}${tags.album ? ' - ' + tags.album : ''}`;
        
        if (tags.picture) {
          const img = document.getElementById('coverImage');
          const base64String = btoa(tags.picture.data.map(b => String.fromCharCode(b)).join(''));
          img.src = `data:${tags.picture.format};base64,${base64String}`;
          img.style.display = 'block';
          document.getElementById('coverPlaceholder').style.display = 'none';
        } else {
          document.getElementById('coverImage').style.display = 'none';
          document.getElementById('coverPlaceholder').style.display = 'block';
        }
        
        const uslt = tags.USLT?.data || tags.USLT;
        const lyricText = uslt?.lyrics || uslt?.text || tags.unsynchronisedLyrics?.text || tags.lyrics || '';
        currentLyrics = parseLyrics(String(lyricText));
        renderLyrics();
      },
      onError: function() {
        document.getElementById('songTitle').textContent = songName;
        document.getElementById('songArtistAlbum').textContent = '';
        document.getElementById('coverImage').style.display = 'none';
        document.getElementById('coverPlaceholder').style.display = 'block';
        currentLyrics = [];
        renderLyrics();
      }
    });
  } else {
    document.getElementById('songTitle').textContent = songName;
    document.getElementById('songArtistAlbum').textContent = '';
    currentLyrics = [];
    renderLyrics();
  }
}

function scrollLyricToCenter(idx) {
  if (isUserScrollingLyrics) return;
  const row = document.querySelector(`.lyric-line-container[data-line-idx="${idx}"]`);
  if (!row) return;
  const box = document.getElementById('lyricsContainer');
  const rowTop = row.offsetTop;
  const boxHeight = box.clientHeight;
  const rowHeight = row.offsetHeight;
  const scrollTop = rowTop - (boxHeight / 2) + (rowHeight / 2);
  
  box.scrollTo({
    top: Math.max(0, scrollTop),
    behavior: 'smooth'
  });
}

function renderLyrics() {
  const box = document.getElementById('lyricsContainer');
  // 保留延迟控制元素
  const delayControl = document.getElementById('lyricDelayControl');
  box.innerHTML = '';
  box.appendChild(delayControl);
  lyricElements = [];

  if (!currentLyrics.length) {
    const noLyrics = document.createElement('div');
    noLyrics.style.cssText = 'text-align:center;color:#999;padding-top:40vh;font-size:18px;';
    noLyrics.textContent = '暂无歌词';
    box.appendChild(noLyrics);
    return;
  }

  currentLyrics.forEach((line, idx) => {
    const row = document.createElement('div');
    row.className = 'lyric-line-container';
    row.setAttribute('data-line-idx', idx);
    row.onclick = () => jumpToLyric(idx);

    // 原文容器
    const textContainer = document.createElement('div');
    textContainer.className = 'lyric-text-container';
    
    if (line.type === 'word-by-word' && line.words && line.words.length > 0) {
      // 逐字/逐词显示
      line.words.forEach((w, wordIdx) => {
        const wordWrapper = document.createElement('span');
        wordWrapper.className = 'lyric-word-wrapper';
        
        // 背景层（灰色）
        const bgSpan = document.createElement('span');
        bgSpan.className = 'lyric-word-bg';
        bgSpan.textContent = w.text;
        
        // 前景层（高亮色）
        const fgSpan = document.createElement('span');
        fgSpan.className = 'lyric-word-fg';
        fgSpan.textContent = w.text;
        fgSpan.dataset.startTime = w.startTime;
        fgSpan.dataset.endTime = w.endTime;
        fgSpan.dataset.text = w.text;
        
        wordWrapper.appendChild(bgSpan);
        wordWrapper.appendChild(fgSpan);
        textContainer.appendChild(wordWrapper);
        
        lyricElements.push(fgSpan);
      });
    } else {
      // 普通行
      const div = document.createElement('div');
      div.className = 'lyric-line';
      div.dataset.index = idx;
      div.textContent = line.text;
      textContainer.appendChild(div);
      lyricElements.push(div);
    }
    
    row.appendChild(textContainer);
    box.appendChild(row);

    // 翻译行（如果有）
    if (line.translate) {
      const tr = document.createElement('div');
      tr.className = 'lyric-translate';
      tr.dataset.parentIdx = idx;
      tr.textContent = line.translate;
      box.appendChild(tr);
    }
  });
}

function jumpToLyric(index) {
  if (index >= currentLyrics.length) return;
  const t = currentLyrics[index].startTime;
  if (isFinite(t)) {
    audio.currentTime = t;
    audio.play(); isPlaying = true; updateBtn();
  }
}

let userScrollTimeout = null;
document.getElementById('lyricsContainer').addEventListener('scroll', () => {
  isUserScrollingLyrics = true;
  clearTimeout(userScrollTimeout);
  userScrollTimeout = setTimeout(() => isUserScrollingLyrics = false, 3000);
});

function updateLyricHighlight() {
  if (!currentLyrics.length) return;
  const ct = audio.currentTime - lyricDelay; // 应用延迟
  let activeIdx = -1;
  let lastActiveLine = -1;

  currentLyrics.forEach((line, idx) => {
    const rowEl = document.querySelector(`.lyric-line-container[data-line-idx="${idx}"]`);
    if (!rowEl) return;

    const isActiveLine = ct >= line.startTime && ct < (line.endTime || line.startTime + 5);
    
    if (isActiveLine) {
      activeIdx = idx;
      lastActiveLine = idx;
    }

    // 逐字高亮
    if (line.type === 'word-by-word' && line.words) {
      line.words.forEach(w => {
        const fgSpan = rowEl.querySelector(`[data-start-time="${w.startTime}"]`);
        if (!fgSpan) return;
        
        if (ct < w.startTime) {
          fgSpan.style.width = '0%';
        } else if (ct >= w.endTime) {
          fgSpan.style.width = '100%';
        } else {
          const progress = (ct - w.startTime) / (w.endTime - w.startTime);
          fgSpan.style.width = `${Math.max(0, Math.min(100, progress * 100))}%`;
        }
      });
      
      // 当前行放大效果
      if (isActiveLine) {
        rowEl.style.transform = 'scale(1.03)';
        rowEl.style.opacity = '1';
      } else {
        rowEl.style.transform = 'scale(1)';
        rowEl.style.opacity = ct < line.startTime ? '0.5' : '0.7';
      }
      
    } else {
      // 普通行高亮
      const divEl = rowEl.querySelector('.lyric-line');
      if (divEl) {
        if (isActiveLine) {
          divEl.classList.add('active');
        } else {
          divEl.classList.remove('active');
        }
      }
    }

    // 翻译行高亮
    const transEl = rowEl.nextElementSibling;
    if (transEl && transEl.classList.contains('lyric-translate')) {
      if (isActiveLine) {
        transEl.classList.add('active');
      } else {
        transEl.classList.remove('active');
      }
    }
  });
  
  // 换行时才滚动
  if (activeIdx !== -1 && activeIdx !== window.lastActiveLyricIdx) {
    scrollLyricToCenter(activeIdx);
    window.lastActiveLyricIdx = activeIdx;
  }
}

function toggleCoverLyric() {
  const lyrics = document.getElementById('lyricsContainer');
  const btn = document.getElementById('coverLyricToggle');
  
  if (lyrics.style.display === 'none' || !lyrics.style.display || lyrics.style.display === '') {
    lyrics.style.display = 'block';
    btn.textContent = '显示封面';
    setTimeout(() => updateLyricHighlight(), 100);
  } else {
    lyrics.style.display = 'none';
    btn.textContent = '显示歌词';
  }
}

function setVolume(value) {
  audio.volume = value / 100;
  dbPut('setting', 'volume', value);
}

// ========== 管理页面功能 ==========
// ========== 备选：使用 getAllKeys 获取所有缓存的键名 ==========
async function updateCachedSongsSet() {
  cachedSongsSet.clear();
  
  if (!db) return;
  
  // 使用 getAllKeys 只获取所有键名（比 getAll 更高效）
  const keys = await new Promise(resolve => {
    const tx = db.transaction([storeName], 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAllKeys();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => resolve([]);
  });
  
  // 将键名添加到集合
  keys.forEach(key => {
    if (typeof key === 'string') {
      cachedSongsSet.add(key);
    }
  });
  
  updateCachedCount();
}

async function renderManageList() {
  await updateCachedSongsSet();
  const container = document.getElementById('manageSongList');
  container.innerHTML = '';
  // 修复：不清空 selectedSongs，保留用户选择状态
  // selectedSongs.clear();  // 删除或注释掉这一行
  
  tracks.forEach((song, idx) => {
    const item = document.createElement('div');
    item.className = 'manage-song-item';
    const isCached = cachedSongsSet.has(song);
    
    item.innerHTML = `
      <div class="manage-song-name">
        <input type="checkbox" id="song_${idx}" value="${idx}" ${selectedSongs.has(idx) ? 'checked' : ''} onchange="toggleSongSelection(${idx})">
        <span class="cache-status ${isCached ? 'cached' : 'uncached'}">${isCached ? '已缓存' : '未缓存'}</span>
        <label for="song_${idx}" style="cursor:pointer; flex:1;">${song}</label>
      </div>
      ${isCached ? `<button onclick="deleteSingleCache('${song.replace(/'/g, "\\'")}')">删除</button>` : ''}
    `;
    container.appendChild(item);
  });
  
  updateSelectedCount();
  // updateCachedCount(); // 移到 updateCachedSongsSet 中统一调用
}

async function deleteSingleCache(songName) {
  if(!confirm(`确定删除 "${songName}" 的缓存吗？`)) return;
  await dbDelete(storeName, songName);
  renderManageList();
}

function toggleSongSelection(idx) {
  const checkbox = document.getElementById(`song_${idx}`);
  if(checkbox.checked) {
    selectedSongs.add(idx);
  } else {
    selectedSongs.delete(idx);
  }
  updateSelectedCount();
}

function selectAllSongs() {
  document.querySelectorAll('#manageSongList input[type=checkbox]').forEach(cb => {
    cb.checked = true;
    selectedSongs.add(parseInt(cb.value));
  });
  updateSelectedCount();
}

function deselectAllSongs() {
  document.querySelectorAll('#manageSongList input[type=checkbox]').forEach(cb => {
    cb.checked = false;
  });
  selectedSongs.clear();
  updateSelectedCount();
}

function updateSelectedCount() {
  document.getElementById('selectedCount').textContent = `已选择: ${selectedSongs.size}`;
}

function updateCachedCount() {
  document.getElementById('cachedCount').textContent = `已缓存: ${cachedSongsSet.size}`;
}

async function downloadSelected() {
  if(selectedSongs.size === 0) {
    alert('请先选择歌曲');
    return;
  }
  
  const songsToDownload = Array.from(selectedSongs).map(idx => tracks[idx]);
  await batchDownload(songsToDownload);
}

async function downloadAll() {
  if(tracks.length === 0) {
    alert('没有歌曲可下载');
    return;
  }
  await batchDownload([...tracks]);
}

async function batchDownload(songs) {
  if (!songs || songs.length === 0) return;
  
  const container = document.getElementById('progressContainer');
  container.style.display = 'block';
  
  let completed = 0;
  const total = songs.length;
  updateProgress(completed, total);
  
  for (const song of songs) {
    try {
      // 检查是否已缓存
      const existing = await getMusic(song);
      if (existing) {
        completed++;
        updateProgress(completed, total);
        continue;
      }
      
      const response = await fetch('/music_play?file=' + encodeURIComponent(song));
      if (!response.ok) throw new Error('Download failed');
      
      const arrayBuffer = await response.arrayBuffer();
      
      // 保存到 IndexedDB
      await new Promise((resolve, reject) => {
        if (!db) return reject(new Error('DB not initialized'));
        const tx = db.transaction([storeName], 'readwrite');
        const store = tx.objectStore(storeName);
        const request = store.put({ id: song, data: arrayBuffer });
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
      
      completed++;
      updateProgress(completed, total);
      
      // 每完成5个更新一次列表
      if (completed % 5 === 0) {
        await updateCachedSongsSet();
        renderManageList();
      }
      
    } catch (error) {
      console.error(`下载失败: ${song}`, error);
    }
  }
  
  // 最终更新
  updateProgress(completed, total);
  await updateCachedSongsSet();
  renderManageList();
  
  setTimeout(() => {
    container.style.display = 'none';
  }, 2000);
  
  if (completed === total) {
    alert('缓存完成！');
  } else {
    alert(`缓存完成: ${completed}/${total}，${total - completed} 个失败`);
  }
}

function updateProgress(current, total) {
  const progressText = document.getElementById('progressText');
  const progressBarFill = document.getElementById('progressBarFill');
  
  progressText.textContent = `进度: ${current}/${total}`;
  const percent = total > 0 ? (current / total) * 100 : 0;
  progressBarFill.style.width = `${percent}%`;
}

async function deleteSelected() {
  if(selectedSongs.size === 0) {
    alert('请先选择歌曲');
    return;
  }
  
  if(!confirm(`确定删除选中的 ${selectedSongs.size} 首歌曲缓存并从所有列表中移除吗？`)) return;
  
  const songsToDelete = Array.from(selectedSongs).map(idx => tracks[idx]);
  
  // 从所有列表中删除这些歌曲
  const lists = await loadLists();
  for(const song of songsToDelete) {
    // 从所有自定义列表中删除
    for(const listName in lists) {
      if(listName !== '全部歌曲' && lists[listName]) {
        const idx = lists[listName].indexOf(song);
        if(idx > -1) {
          lists[listName].splice(idx, 1);
        }
      }
    }
    
    // 从当前播放队列中删除
    const queueIdx = currentQueue.indexOf(song);
    if(queueIdx > -1) {
      currentQueue.splice(queueIdx, 1);
      if(currentTrack >= queueIdx && currentTrack > 0) {
        currentTrack--;
      }
    }
    
    // 从tracks中删除
    const trackIdx = tracks.indexOf(song);
    if(trackIdx > -1) {
      tracks.splice(trackIdx, 1);
    }
    
    // 删除缓存
    await dbDelete(storeName, song);
  }
  
  // 更新全部歌曲列表
  lists['全部歌曲'] = tracks;
  await saveLists(lists);
  await dbPut('playlist', 'all', tracks);
  await dbPut('currentList', 'queue', currentQueue);
  
  alert('删除完成!');
  selectedSongs.clear();
  updateSelectedCount();
  renderManageList();
  renderLists();
  renderPlaylist();
}

async function clearCache(){
  if(confirm('清除所有音频缓存？')) {
    await dbClear(storeName);
    alert('已清除缓存');
    renderManageList();
  }
}

// ========== 初始化 ==========
(async()=>{
  await initDB();
  
  // 加载设置
  const volumeSetting = await dbGet('setting', 'volume');
  if(volumeSetting) {
    document.getElementById('volumeSlider').value = volumeSetting.data;
    audio.volume = volumeSetting.data / 100;
  }
  
  // 加载歌词延迟
  await loadLyricDelay();
  
  try {
    const response = await fetch('/music_list');
    if (response.ok) {
      const serverTracks = await response.json();
      const savedTracks = await dbGet('playlist', 'all');
      tracks = [...new Set([...(savedTracks?.data || []), ...serverTracks])];
      await dbPut('playlist', 'all', tracks);
    } else {
      throw new Error('服务器响应错误');
    }
  } catch (error) {
    console.error('获取服务器列表失败:', error);
    const saved = await dbGet('playlist', 'all');
    if (saved) tracks = saved.data || [];
    else tracks = [];
  }

  const lists = await loadLists();
  lists['全部歌曲'] = tracks;
  await saveLists(lists);

  const savedQueue = await dbGet('currentList', 'queue');
  if(savedQueue && savedQueue.data && savedQueue.data.length > 0) {
    currentQueue = savedQueue.data;
  } else {
    currentQueue = [...tracks];
    await dbPut('currentList', 'queue', currentQueue);
  }

  renderPlaylist();
  renderLists();
  renderStats();
  renderManageList();
})();
</script>
